<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可疑標記重審</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
.header { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; }
.stats { font-size: 13px; color: #64748b; }
.stats span { font-weight: 700; }
.stats .pending { color: #f97316; }
.stats .flipped { color: #2563eb; }
.stats .kept { color: #94a3b8; }

.card { max-width: 800px; margin: 20px auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
.keyword { background: #f1f5f9; padding: 8px 16px; font-size: 12px; color: #64748b; }

.banner { padding: 12px 16px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.banner.same { background: #dcfce7; color: #166534; }
.banner.diff { background: #fee2e2; color: #991b1b; }
.banner .score { font-weight: 700; font-family: monospace; }

.pair { display: flex; gap: 0; }
.side { flex: 1; padding: 16px; }
.side:first-child { border-right: 1px solid #e2e8f0; }
.platform { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.platform.shopee { color: #f97316; }
.platform.coupang { color: #dc2626; }
.product-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #f8fafc; border-radius: 8px; margin-bottom: 8px; }
.product-name { font-size: 13px; line-height: 1.5; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.price { font-size: 18px; font-weight: 700; color: #1e293b; }

.actions { display: flex; gap: 8px; padding: 12px 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-yes { background: #22c55e; color: white; }
.btn-yes:hover { background: #16a34a; }
.btn-no { background: #ef4444; color: white; }
.btn-no:hover { background: #dc2626; }
.btn-keep { background: #e2e8f0; color: #64748b; }
.btn-keep:hover { background: #cbd5e1; }
.btn-back { background: #94a3b8; color: white; }
.btn-back:hover { background: #64748b; }

.done { text-align: center; padding: 60px 20px; max-width: 600px; margin: 0 auto; }
.done h2 { margin-bottom: 12px; }
.done p { margin-bottom: 8px; color: #64748b; }
.export-btn { background: #f97316; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; }
.export-btn:hover { background: #ea580c; }
.hint { margin-top: 24px; padding: 16px; background: #fef3c7; border-radius: 8px; font-size: 13px; color: #78350f; text-align: left; }
.hint code { background: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

.progress { height: 3px; background: #e2e8f0; }
.progress-bar { height: 100%; background: #f97316; transition: width 0.3s; }

.shortcuts { text-align: center; font-size: 11px; color: #94a3b8; padding: 8px 0 16px; }
.shortcuts kbd { background: white; border: 1px solid #cbd5e1; border-radius: 4px; padding: 1px 6px; font-family: monospace; font-size: 11px; }
</style>
</head>
<body>

<div class="header">
  <h1>可疑標記重審</h1>
  <div class="stats">
    <span class="pending" id="count">0</span> / <span id="total">0</span>
    &nbsp;|&nbsp;翻面 <span class="flipped" id="flippedCount">0</span>
    &nbsp;維持 <span class="kept" id="keptCount">0</span>
    &nbsp;|&nbsp;<a href="#" onclick="resetAll();return false" style="color:#94a3b8;font-size:12px">重頭開始</a>
  </div>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<div id="cardContainer"></div>
<div class="shortcuts">
  <kbd>Y</kbd>/<kbd>1</kbd> 同款 &nbsp;
  <kbd>N</kbd>/<kbd>0</kbd> 不同 &nbsp;
  <kbd>K</kbd>/<kbd>Space</kbd> 維持原標 &nbsp;
  <kbd>Z</kbd>/<kbd>⌫</kbd> 上一步
</div>

<script>
const STORAGE_KEY = 'review_corrections';
let pairs = [];
let current = 0;
let decisions = []; // { id, original_label, new_label } — new_label 為 null 表示維持原標

async function init() {
  try {
    const resp = await fetch('../data/suspicious_review.json');
    pairs = await resp.json();
  } catch (e) {
    document.getElementById('cardContainer').innerHTML = `
      <div class="done">
        <h2>載入失敗</h2>
        <p>找不到 <code>data/suspicious_review.json</code></p>
        <p>請先執行 <code>python3 review_gen.py</code></p>
      </div>`;
    return;
  }
  document.getElementById('total').textContent = pairs.length;

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    decisions = JSON.parse(saved);
    current = decisions.length;
  }

  updateStats();
  showCurrent();
}

function showCurrent() {
  const container = document.getElementById('cardContainer');

  if (current >= pairs.length) {
    const flipped = decisions.filter(d => d.new_label !== null && d.new_label !== d.original_label);
    const kept = decisions.filter(d => d.new_label === null || d.new_label === d.original_label);
    container.innerHTML = `
      <div class="done">
        <h2>重審完成！</h2>
        <p>翻面 ${flipped.length} 筆（標記會被修正）</p>
        <p>維持原標 ${kept.length} 筆</p>
        <button class="export-btn" onclick="exportData()">匯出修正檔</button>
        <div class="hint">
          <strong>下一步：</strong><br>
          1. 把下載的 <code>review_corrections.json</code> 放到 <code>data/</code><br>
          2. 執行 <code>python3 review_apply.py</code> 套用修正<br>
          3. 執行 <code>python3 train.py</code> 重訓練<br>
          4. 執行 <code>python3 check.py</code> 看剩多少可疑
        </div>
      </div>`;
    return;
  }

  const p = pairs[current];
  const origText = p.original_label === 1 ? '同款' : '不同';
  const origClass = p.original_label === 1 ? 'same' : 'diff';
  const origIcon = p.original_label === 1 ? '✅' : '❌';

  container.innerHTML = `
    <div class="card">
      <div class="keyword">#${current + 1}/${pairs.length} — 搜尋：${p.keyword || ''} ${p.shopee_brand ? '| 品牌：' + p.shopee_brand : ''}</div>
      <div class="banner ${origClass}">
        <span>你原本標：${origIcon} <strong>${origText}</strong></span>
        <span>模型分數：<span class="score">${p.model_score.toFixed(3)}</span></span>
      </div>
      <div class="pair">
        <div class="side">
          <div class="platform shopee">蝦皮</div>
          <img class="product-img" src="${p.shopee.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><text y=%221%22 font-size=%221%22>🖼️</text></svg>'">
          <div class="product-name">${p.shopee.name}</div>
          <div class="price">$${p.shopee.price.toLocaleString()}</div>
        </div>
        <div class="side">
          <div class="platform coupang">酷澎</div>
          <img class="product-img" src="${p.coupang.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><text y=%221%22 font-size=%221%22>🖼️</text></svg>'">
          <div class="product-name">${p.coupang.name}</div>
          <div class="price">$${p.coupang.price.toLocaleString()}</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-back" onclick="goBack()" style="flex:0.5">⬅️ 上一步</button>
        <button class="btn btn-yes" onclick="decide(1)">✅ 同款</button>
        <button class="btn btn-no" onclick="decide(0)">❌ 不同</button>
        <button class="btn btn-keep" onclick="decide(null)">⏭️ 維持原標</button>
      </div>
    </div>`;
}

function decide(newLabel) {
  const p = pairs[current];
  decisions.push({
    id: p.id,
    original_label: p.original_label,
    new_label: newLabel, // null = 維持原標
  });
  current++;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
  updateStats();
  showCurrent();
}

function goBack() {
  if (current <= 0) return;
  current--;
  decisions.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
  updateStats();
  showCurrent();
}

function updateStats() {
  document.getElementById('count').textContent = decisions.length;
  const flipped = decisions.filter(d => d.new_label !== null && d.new_label !== d.original_label);
  const kept = decisions.filter(d => d.new_label === null || d.new_label === d.original_label);
  document.getElementById('flippedCount').textContent = flipped.length;
  document.getElementById('keptCount').textContent = kept.length;
  const total = pairs.length || 1;
  document.getElementById('progressBar').style.width = (current / total * 100) + '%';
}

function resetAll() {
  if (!confirm('確定要清除審核進度重頭開始嗎？')) return;
  decisions = [];
  current = 0;
  localStorage.removeItem(STORAGE_KEY);
  updateStats();
  showCurrent();
}

function exportData() {
  // 只輸出有實際翻面的筆數（維持原標的不用匯出）
  const corrections = decisions
    .filter(d => d.new_label !== null && d.new_label !== d.original_label)
    .map(d => ({ id: d.id, label: d.new_label }));
  const blob = new Blob([JSON.stringify(corrections, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'review_corrections.json';
  a.click();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'y' || e.key === '1') decide(1);
  if (e.key === 'n' || e.key === '0') decide(0);
  if (e.key === 'k' || e.key === ' ') decide(null);
  if (e.key === 'z' || e.key === 'Backspace') goBack();
});

init();
</script>
</body>
</html>
